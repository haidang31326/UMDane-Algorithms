spring:
  application:
    name: UMDane

  datasource:
    url: jdbc:mysql://localhost:3306/umdane_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: umdane_user
    password: umdane_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  flyway:
    enabled: true
    baseline-on-migrate: true
    url: ${spring.datasource.url}
    user: ${spring.datasource.username}
    password: ${spring.datasource.password}

  data:
    redis:
      host: localhost
      port: 6379

umdane:
  gemini:
    api-key: ${GEMINI_API_KEY:}