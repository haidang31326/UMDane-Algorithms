version: '3.8'

services:
  umdane-mysql:
    image: mysql:8.0
    container_name: umdane_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=umdane_db
      - MYSQL_USER=umdane_user
      - MYSQL_PASSWORD=umdane_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  umdane-redis:
    image: redis:7-alpine
    container_name: umdane_cache
    ports:
      - "6379:6379"

volumes:
  mysql_data: