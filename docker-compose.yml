version: '3.8'

services:
  umdane-mysql:
    image: mysql:8.0
    container_name: umdane_db
    environment:
      - MYSQL_ROOT_PASSWORD=root_password
      - MYSQL_DATABASE=umdane_db
      - MYSQL_USER=umdane_user
      - MYSQL_PASSWORD=umdane_password
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  umdane-redis:
    image: redis:7-alpine
    container_name: umdane_cache
    ports:
      - "6379:6379"

  umdane-backend:
    build: .
    container_name: umdane_backend
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://umdane-mysql:3306/umdane_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      - SPRING_DATASOURCE_USERNAME=umdane_user
      - SPRING_DATASOURCE_PASSWORD=umdane_password
      - SPRING_DATA_REDIS_HOST=umdane-redis
      - SPRING_DATA_REDIS_PORT=6379
    ports:
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    depends_on:
      - umdane-mysql
      - umdane-redis

  umdane-frontend:
    build: ./frontend
    container_name: umdane_frontend
    ports:
      - "3000:80"
    depends_on:
      - umdane-backend

  # Keycloak configuration (Optional Devops Setup)
  umdane-keycloak:
    image: quay.io/keycloak/keycloak:24.0
    container_name: umdane_keycloak
    command: start-dev
    environment:
      - KEYCLOAK_ADMIN=admin
      - KEYCLOAK_ADMIN_PASSWORD=admin
    ports:
      - "8081:8080"
    depends_on:
      - umdane-mysql

volumes:
  mysql_data: